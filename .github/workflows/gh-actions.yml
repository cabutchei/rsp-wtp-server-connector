name: Connector CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      publish_to_marketplace:
        description: Publish to the VS Code Marketplace
        required: true
        type: boolean
        default: false
      publish_to_ovsx:
        description: Publish to Open VSX
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node: ['20']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run unit tests
        uses: GabrielBB/xvfb-action@v1.0
        with:
          run: npm test
      - name: Run public UI tests
        if: runner.os == 'Linux'
        uses: GabrielBB/xvfb-action@v1.0
        with:
          run: npm run public-ui-test
      - name: Archive test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            test-resources/screenshots/*.png
          retention-days: 2

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install packaging tools
        run: npm install -g @vscode/vsce ovsx
      - name: Install dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
      - name: Materialize packaged server
        run: npm run package
      - name: Cache extension version
        run: |
          EXT_VERSION="$(node -p "require('./package.json').version")"
          echo "EXT_VERSION=${EXT_VERSION}" >> "${GITHUB_ENV}"
      - name: Package connector VSIX
        run: |
          mkdir -p dist
          vsce package --out "dist/rsp-wtp-server-connector-${EXT_VERSION}.vsix"
          ls -lash dist/*.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsp-wtp-server-connector
          path: dist/rsp-wtp-server-connector-${{ env.EXT_VERSION }}.vsix
          if-no-files-found: error

  publish:
    if: inputs.publish_to_marketplace == true || inputs.publish_to_ovsx == true
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install publishing tools
        run: npm install -g @vscode/vsce ovsx
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: rsp-wtp-server-connector
          path: dist
      - name: Publish to VS Code Marketplace
        if: inputs.publish_to_marketplace == true
        run: |
          for vsix in dist/*.vsix; do
            vsce publish --skip-duplicate -p "${{ secrets.VSCODE_MARKETPLACE_TOKEN }}" --packagePath "${vsix}"
          done
      - name: Publish to Open VSX
        if: inputs.publish_to_ovsx == true
        run: |
          for vsix in dist/*.vsix; do
            ovsx publish --skip-duplicate -p "${{ secrets.OVSX_MARKETPLACE_TOKEN }}" --packagePath "${vsix}"
          done
